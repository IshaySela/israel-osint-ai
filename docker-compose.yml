services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - osint_network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - osint_network

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - osint_network
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./services/backend
      dockerfile: Dockerfile.dev
    container_name: backend
    ports:
      - "5000:5000"
    volumes:
      - ./services/backend:/app
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - osint_network

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile.dev
    container_name: frontend
    ports:
      - "5173:5173"
    volumes:
      - ./services/frontend:/app
      - /app/node_modules
    environment:
      - VITE_GRAPHQL_URL=http://localhost:5000/graphql
    networks:
      - osint_network

  processing:
    build:
      context: ./services/processing
      dockerfile: Dockerfile.dev
    container_name: processing
    volumes:
      - ./services/processing:/app
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - RABBIT_QUEUE=${RABBIT_QUEUE}
      - ELASTICSEARCH_URLS=http://elasticsearch:9200
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - osint_network

  telegram-scraper:
    build:
      context: ./services/ingestion/telegram-scraper
      dockerfile: Dockerfile.dev
    container_name: telegram-scraper
    volumes:
      - ./services/ingestion/telegram-scraper:/app
    env_file:
      - ./services/ingestion/telegram-scraper/.env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - RABBIT_HOST=rabbitmq
      - RABBIT_QUEUE=${RABBIT_QUEUE}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - osint_network

networks:
  osint_network:
    driver: bridge

volumes:
  elasticsearch_data:
  rabbitmq_data:
